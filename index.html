<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Status Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: #22c55e;
            border-radius: 50%;
            margin-right: 6px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>
    <div>
        <h1>Ariane's Status Page</h1>
        <p><span class="dot"></span>All systems go </p>
        <p>Deployed via Docker + GitHub Actions + Render </p>
    </div>
</body>
</html>
